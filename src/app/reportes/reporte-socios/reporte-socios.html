<div class="row">
  <div class="col-12">
    <!-- Tarjeta con gráfico -->
    <div class="card border shadow-xs mb-4">
      <div class="card-header pb-0">
        <h6 class="font-weight-semibold text-lg mb-0">Reporte General de Socios</h6>
        <p class="text-sm mb-sm-0">Visualización de los estados generales de los socios registrados</p>
      </div>
      <div class="card-body">
        <div class="d-flex justify-content-center">
          <!-- <canvas
            baseChart
            [data]="chartData"
            [type]="chartType"
            [labels]="chartLabels" 
            style="max-height: 300px; width: 100%;">
          </canvas> -->
        </div>
      </div>
    </div>

    <!-- Tabla resumen de socios -->
    <div class="card border shadow-xs mb-4">
      <div class="card-header pb-0">
        <h6 class="font-weight-semibold text-lg mb-0">Listado de Socios</h6>
        <p class="text-sm">Información general de cada socio registrado</p>
      </div>
      <div class="card-body px-0 py-0">
        <div class="table-responsive p-0">
          <table class="table align-items-center mb-0">
            <thead class="bg-gray-100">
              <tr>
                <th class="text-secondary text-xs font-weight-semibold">Nombre</th>
                <th class="text-secondary text-xs font-weight-semibold">Tipo</th>
                <th class="text-secondary text-xs font-weight-semibold">Ingreso</th>
                <th class="text-secondary text-xs font-weight-semibold">Estado</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let socio of socios">
                <td><p class="text-sm mb-0">{{ socio.nombre }}</p></td>
                <td><p class="text-sm mb-0">{{ socio.tipo }}</p></td>
                <td><p class="text-sm mb-0">{{ socio.ingreso }}</p></td>
                <td>
                  <!-- <span class="badge fw-bold"
                    [ngClass]="{
                      'text-bg-success': socio.estado === 'Activo',
                      'text-bg-warning': socio.estado === 'Pendiente',
                      'text-bg-danger': socio.estado === 'Inactivo'
                    }">
                    {{ socio.estado }}
                  </span> -->
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
