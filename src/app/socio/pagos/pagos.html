<div class="row">
  <div class="col-12">
    <div class="card border shadow-xs mb-4">
      <div class="card-header border-bottom pb-0">
        <div class="d-sm-flex align-items-center mb-3">
          <div>
            <h6 class="font-weight-semibold text-lg mb-0">Registrar Pago de Mensualidad</h6>
            <p class="text-sm mb-sm-0">Completa los datos del socio y sube el comprobante de transferencia.</p>
          </div>
        </div>
      </div>

      <div class="card-body px-4 py-4">
        <form>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Socio</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej. Gabriel Encalada" required>
          </div>

          <div class="mb-3">
            <label for="cedula" class="form-label">Cédula</label>
            <input type="text" class="form-control" id="cedula" placeholder="Ej. 0700000000" required>
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="correo" placeholder="Ej. ejemplo@gmail.com" required>
          </div>

          <div class="mb-3">
            <label for="monto" class="form-label">Monto Transferido</label>
            <input type="number" class="form-control" id="monto" placeholder="Ej. 50.00" required>
          </div>

          <div class="mb-4">
            <label for="comprobante" class="form-label">Comprobante de Transferencia (imagen)</label>
            <input type="file" class="form-control" id="comprobante" accept="image/*" required>
          </div>

          <button type="submit" class="btn btn-success">Enviar Comprobante</button>
        </form>
      </div>
    </div>
  </div>
</div>
